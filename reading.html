    sel.value = state.textChoice === 'random' ? 'random' : String(state.textChoice);
    sel.onchange = () => {
      const v = sel.value;
      state.textChoice = v === 'random' ? 'random' : Number(v);
      saveSettings();
    };
  }

  // Mode toggles
  document.querySelectorAll('.mode-card').forEach(c => {
    c.onclick = () => {
      document.querySelectorAll('.mode-card').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      state.mode = c.dataset.mode;
      saveSettings();
      $('wpmSection').style.display = state.mode === 'rsvp' ? 'block' : 'none';
    };
  });

  // ─── Press-and-hold repeat for WPM buttons ───
  function attachPressRepeat(btn, fn) {
    let timeoutId = null;
    let intervalId = null;
    const start = (e) => {
      e.preventDefault();
      fn();
      timeoutId = setTimeout(() => {
        intervalId = setInterval(fn, 60);
      }, 400);
    };
    const stop = () => {
      if (timeoutId) { clearTimeout(timeoutId); timeoutId = null; }
      if (intervalId) { clearInterval(intervalId); intervalId = null; }
    };
    btn.addEventListener('mousedown', start);
    btn.addEventListener('touchstart', start, { passive: false });
    ['mouseup','mouseleave','touchend','touchcancel'].forEach(ev => btn.addEventListener(ev, stop));
  }

  function setWpm(newVal) {
    state.wpm = Math.max(10, Math.min(500, newVal));
    $('wpmStart').textContent = state.wpm;
    $('rsvpWpm').textContent = state.wpm;
    saveSettings();
  }

  attachPressRepeat($('wpmMinus'), () => setWpm(state.wpm - 1));
  attachPressRepeat($('wpmPlus'),  () => setWpm(state.wpm + 1));

  // Start
  $('startBtn').onclick = () => {
    if (state.mode === 'timer') startTimerMode();
    else startRsvpMode();
  };

  // ─── Countdown ──────────────────────────
  function countdown(cb) {
    const overlay = $('countdown');
    const num = $('countdownNum');
    overlay.classList.add('active');
    const seq = ['3', '2', '1', 'Старт!'];
    let i = 0;
    const tick = () => {
      num.textContent = seq[i];
      num.style.animation = 'none';
      void num.offsetHeight;
      num.style.animation = 'countPulse 0.9s ease-out';
      i++;
      if (i >= seq.length) {
        setTimeout(() => { overlay.classList.remove('active'); cb(); }, 700);
      } else {
        setTimeout(tick, 900);
      }
    };
    tick();
  }

  // ─── Timer mode ─────────────────────────
  function startTimerMode() {
    const t = pickText();
    game.tokens = tokenize(t.text);
    renderReadingText($('readingText'), false);
    show('screen-timer');
    countdown(() => {
      game.startTime = Date.now();
      game.durationMs = 60000;
      runTimer();
    });
  }

  function runTimer() {
    clearInterval(game.timerInterval);
    game.timerInterval = setInterval(() => {
      const elapsed = Date.now() - game.startTime;
      const remaining = Math.max(0, game.durationMs - elapsed);
      const secs = Math.ceil(remaining / 1000);
      $('timerVal').textContent = '00:' + String(secs).padStart(2, '0');
      if (remaining === 0) {
        clearInterval(game.timerInterval);
        game.endTime = Date.now();
        goToPicker();
      }
    }, 200);
  }

  $('doneBtn').onclick = () => {
    if (!game.startTime) return;
    clearInterval(game.timerInterval);
    game.endTime = Date.now();
    const totalWords = game.tokens.filter(t => t.isWord).length;
    showResult(totalWords, (game.endTime - game.startTime) / 1000);
  };

  function renderReadingText(el, clickable) {
    el.innerHTML = '';
    game.tokens.forEach((t, i) => {
      if (t.isWord) {
        const span = document.createElement('span');
        span.className = 'word';
        span.textContent = t.text;
        if (clickable) {
          span.onclick = () => {
            // Just mark the selection; confirm button commits it.
            el.querySelectorAll('.word.selected').forEach(s => s.classList.remove('selected'));
            span.classList.add('selected');
            game.pickedIdx = i;
            $('confirmPickBtn').disabled = false;
          };
        }
        el.appendChild(span);
      } else {
        el.appendChild(document.createTextNode(t.text));
      }
      if (t.afterSep) el.appendChild(document.createTextNode(t.afterSep));
    });
  }

  function goToPicker() {
    game.pickedIdx = null;
    $('confirmPickBtn').disabled = true;
    renderReadingText($('readingTextPickable'), true);
    show('screen-picker');
  }

  $('confirmPickBtn').onclick = () => {
    if (game.pickedIdx == null) return;
    const wr = wordsReadUpTo(game.pickedIdx);
    const elapsedSec = (game.endTime - game.startTime) / 1000;
    showResult(wr, elapsedSec);
  };

  // ─── Result ─────────────────────────────
  function showResult(wordsRead, elapsedSec) {
    if (elapsedSec <= 0) elapsedSec = 0.1;
    const wpm = Math.round(wordsRead * 60 / elapsedSec);
    $('resWpm').textContent = wpm;
    $('resWords').textContent = wordsRead;
    $('resTime').textContent = Math.round(elapsedSec);

    let emoji, title, gradeClass, gradeText;
    if (wpm >= 140) { emoji = '🚀'; title = 'Ты летишь!'; gradeClass = 'good';
      gradeText = 'Очень быстрое чтение — отличный результат!'; }
    else if (wpm >= 100) { emoji = '🌟'; title = 'Отлично!'; gradeClass = 'good';
      gradeText = 'Ты читаешь очень быстро. Так держать!'; }
    else if (wpm >= 70) { emoji = '😊'; title = 'Хорошо!'; gradeClass = 'good';
      gradeText = 'Хорошая скорость чтения. Можно попробовать ещё быстрее.'; }
    else if (wpm >= 40) { emoji = '👍'; title = 'Неплохо!'; gradeClass = 'ok';
      gradeText = 'Ты уже читаешь уверенно. Продолжай тренироваться!'; }
    else { emoji = '💪'; title = 'Тренируйся!'; gradeClass = 'need';
      gradeText = 'Читай каждый день по 10–15 минут — скорость обязательно вырастет.'; }

    $('resEmoji').textContent = emoji;
    $('resTitle').textContent = title;
    const gb = $('gradeBox');
    gb.className = 'grade-box ' + gradeClass;
    gb.textContent = gradeText;
    show('screen-results');
  }

  // ─── RSVP ───────────────────────────────
  function buildRsvpGroups(tokens) {
    const words = tokens.filter(t => t.isWord).map(t => t.text);
    const groups = [];
    let buf = '';
    const MAX = 16;
    const short = w => w.length <= 2;
    for (const w of words) {
      if (buf) {
        if (buf.length + 1 + w.length <= MAX) {
          groups.push(buf + ' ' + w);
        } else {
          groups.push(buf);
          groups.push(w);
        }
        buf = '';
      } else if (short(w)) {
        buf = w;
      } else {
        groups.push(w);
      }
    }
    if (buf) groups.push(buf);
    // Mean character length per WORD (letters only, no spaces).
    // Used so the length factor is calibrated against this particular text.
    const totalChars = words.reduce((a, w) => a + w.length, 0);
    const avgCharPerWord = words.length > 0 ? totalChars / words.length : 5;
    return { groups, avgCharPerWord };
  }

  function startRsvpMode() {
    const t = pickText();
    game.tokens = tokenize(t.text);
    const built = buildRsvpGroups(game.tokens);
    game.rsvpGroups = built.groups;
    game.rsvpAvgCharPerWord = built.avgCharPerWord;
    game.rsvpIdx = 0;
    game.rsvpPlaying = false;
    game.rsvpPlayedMs = 0;
    $('rsvpTitle').textContent = t.title;
    $('rsvpProgress').textContent = `0 / ${game.rsvpGroups.length}`;
    $('rsvpWpm').textContent = state.wpm;
    $('rsvpCurrent').textContent = game.rsvpGroups[0] || '';
    $('rsvpProgFill').style.width = '0%';
    $('rsvpPlay').textContent = '⏸';
    show('screen-rsvp');
    countdown(() => { startRsvpPlayback(); });
  }

  function startRsvpPlayback() {
    game.rsvpPlaying = true;
    $('rsvpPlay').textContent = '⏸';
    scheduleRsvpTick();
  }

  // Frame duration is proportional to the total character length of the group,
  // calibrated against the text's average word length — so long words linger
  // and short ones pass quickly, while the mean rate stays at the configured WPM.
  // A floor keeps short words readable (a word can't show faster than 45% of
  // its "fair share" of the base word time).
  function computeFrameMs(groupText) {
    if (!groupText) return 60000 / state.wpm;
    const baseMs = 60000 / state.wpm;
    const avgCharPerWord = game.rsvpAvgCharPerWord || 5;
    // Count chars excluding the joining space between grouped short words.
    const charCount = groupText.replace(/\s+/g, '').length;
    const wordCount = groupText.split(/\s+/).filter(Boolean).length || 1;
    const proportional = baseMs * (charCount / avgCharPerWord);
    const minFloor = baseMs * 0.45 * wordCount;
    return Math.max(minFloor, proportional);
  }

  function scheduleRsvpTick() {
    clearTimeout(game.rsvpTimer);
    if (!game.rsvpPlaying) return;
    const g = game.rsvpGroups[game.rsvpIdx];
    if (!g) { finishRsvp(); return; }
    const ms = computeFrameMs(g);
    game.rsvpTimer = setTimeout(() => {
      game.rsvpPlayedMs += ms;
      game.rsvpIdx++;
      if (game.rsvpIdx >= game.rsvpGroups.length) {
        finishRsvp();
        return;
      }
      renderRsvpFrame();
      scheduleRsvpTick();
    }, ms);
  }

  function renderRsvpFrame() {
    const g = game.rsvpGroups, i = game.rsvpIdx;
    $('rsvpCurrent').textContent = g[i] || '';
    $('rsvpProgress').textContent = `${Math.min(i + 1, g.length)} / ${g.length}`;
    $('rsvpProgFill').style.width = ((i + 1) / g.length * 100) + '%';
  }

  function finishRsvp() {
    clearTimeout(game.rsvpTimer);
    game.rsvpPlaying = false;
    const totalSec = game.rsvpPlayedMs / 1000;
    const totalWords = game.tokens.filter(t => t.isWord).length;
    showResult(totalWords, totalSec);
  }

  $('rsvpPlay').onclick = () => {
    if (game.rsvpIdx >= game.rsvpGroups.length) return;
    game.rsvpPlaying = !game.rsvpPlaying;
    $('rsvpPlay').textContent = game.rsvpPlaying ? '⏸' : '▶';
    if (game.rsvpPlaying) scheduleRsvpTick();
    else clearTimeout(game.rsvpTimer);
  };

  $('rsvpPrev').onclick = () => {
    if (game.rsvpIdx > 0) {
      game.rsvpIdx--;
      renderRsvpFrame();
      scheduleRsvpTick(); // reset timing so prev word stays full duration
    }
  };

  attachPressRepeat($('rsvpMinus'), () => {
    setWpm(state.wpm - 1);
    scheduleRsvpTick();
  });
  attachPressRepeat($('rsvpPlus'), () => {
    setWpm(state.wpm + 1);
    scheduleRsvpTick();
  });

  // ─── Results buttons ────────────────────
  $('restartBtn').onclick = () => {
    if (state.mode === 'timer') startTimerMode();
    else startRsvpMode();
  };
  $('menuBtn').onclick = () => {
    stopAll();
    show('screen-menu');
  };

  function stopAll() {
    clearInterval(game.timerInterval);
    clearTimeout(game.rsvpTimer);
    game.rsvpPlaying = false;
    $('countdown').classList.remove('active');
  }

  // ─── Back ───────────────────────────────
  $('backBtn').onclick = () => {
    stopAll();
    const active = document.querySelector('.screen.active');
    if (!active || active.id === 'screen-menu') {
      window.location.href = 'index.html';
      return;
    }
    if (active.id === 'screen-timer' || active.id === 'screen-rsvp') {
      if (!confirm('Выйти? Прогресс не сохранится.')) return;
    }
    show('screen-menu');
  };

  // ─── Init ───────────────────────────────
  renderTextSelect();
  document.querySelectorAll('.mode-card').forEach(c => {
    c.classList.toggle('active', c.dataset.mode === state.mode);
  });
  $('wpmSection').style.display = state.mode === 'rsvp' ? 'block' : 'none';
  $('wpmStart').textContent = state.wpm;
  $('rsvpWpm').textContent = state.wpm;
})();
</script>
</body>
</html>
