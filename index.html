<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Учимся — выбери предмет</title>
<style>
:root {
  --pink: #e91e8c;
  --pink-light: #fce4f3;
  --green: #4CAF50;
  --orange: #FF9800;
  --blue: #2196F3;
  --blue-light: #e3f2fd;
  --purple: #9C27B0;
  --bg: #fafafa;
  --card-shadow: 0 8px 24px rgba(0,0,0,0.08);
  --radius: 20px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #fafafa 0%, #f0f4fa 100%);
  color: #333;
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 28px 20px;
}

.container {
  width: 100%;
  max-width: 500px;
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
  justify-content: center;
}

.hero {
  text-align: center;
  margin-bottom: 32px;
}
.hero .emoji {
  font-size: 64px;
  margin-bottom: 12px;
  display: block;
  animation: bounce 2s ease-in-out infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.hero h1 {
  font-size: 28px;
  font-weight: 700;
  color: #333;
  margin-bottom: 8px;
}
.hero p {
  font-size: 15px;
  color: #888;
}

.cards {
  display: flex;
  flex-direction: column;
  gap: 16px;
  width: 100%;
}

.card {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 22px 22px;
  border-radius: var(--radius);
  text-decoration: none;
  color: white;
  box-shadow: var(--card-shadow);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative;
  overflow: hidden;
}
.card::after {
  content: '';
  position: absolute;
  top: -40%;
  right: -20%;
  width: 180px;
  height: 180px;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
  pointer-events: none;
}
.card:active { transform: scale(0.98); }

.card.english {
  background: linear-gradient(135deg, var(--pink), #c2185b);
  box-shadow: 0 10px 28px rgba(233, 30, 140, 0.3);
}
.card.math {
  background: linear-gradient(135deg, var(--blue), #1565C0);
  box-shadow: 0 10px 28px rgba(33, 150, 243, 0.3);
}
.card.reading {
  background: linear-gradient(135deg, var(--purple), #6A1B9A);
  box-shadow: 0 10px 28px rgba(156, 39, 176, 0.3);
}
.card.composition {
  background: linear-gradient(135deg, var(--green), #2E7D32);
  box-shadow: 0 10px 28px rgba(76, 175, 80, 0.3);
}
.card.composition-mix {
  background: linear-gradient(135deg, #009688, #00695C);
  box-shadow: 0 10px 28px rgba(0, 150, 136, 0.3);
}

.card .icon {
  font-size: 42px;
  flex-shrink: 0;
  width: 68px;
  height: 68px;
  background: rgba(255,255,255,0.22);
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
}

.card .content { flex: 1; }
.card .title {
  font-size: 21px;
  font-weight: 700;
  margin-bottom: 4px;
  letter-spacing: -0.3px;
}
.card .subtitle {
  font-size: 13px;
  opacity: 0.85;
}
.card .arrow {
  font-size: 26px;
  opacity: 0.7;
  font-weight: 300;
}

.footer {
  margin-top: 28px;
  font-size: 12px;
  color: #999;
  text-align: center;
}
</style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <span class="emoji">🎒</span>
      <h1>Что учим сегодня?</h1>
      <p>Выбери, чем хочешь заняться</p>
    </div>

    <div class="cards">
      <a href="english.html" class="card english">
        <div class="icon">🇬🇧</div>
        <div class="content">
          <div class="title">Английский</div>
          <div class="subtitle">Spotlight 2 — слова и звуки</div>
        </div>
        <div class="arrow">→</div>
      </a>

      <a href="multiplication.html" class="card math">
        <div class="icon">🧮</div>
        <div class="content">
          <div class="title">Таблица умножения</div>
          <div class="subtitle">Тренажёр с подсказками</div>
        </div>
        <div class="arrow">→</div>
      </a>

      <a href="reading.html" class="card reading">
        <div class="icon">📖</div>
        <div class="content">
          <div class="title">Чтение</div>
          <div class="subtitle">Скорость чтения и ускоритель</div>
        </div>
        <div class="arrow">→</div>
      </a>

      <a href="composition.html" class="card composition">
        <div class="icon">➕</div>
        <div class="content">
          <div class="title">Состав числа</div>
          <div class="subtitle">Дополни до 10 — 1 класс</div>
        </div>
        <div class="arrow">→</div>
      </a>

      <a href="composition-mix.html" class="card composition-mix">
        <div class="icon">🎲</div>
        <div class="content">
          <div class="title">Микс составов</div>
          <div class="subtitle">2-10 вперемешку: 6+?=8, 3+?=7…</div>
        </div>
        <div class="arrow">→</div>
      </a>
    </div>
  </div>

  <div class="footer">Сделано для учёбы 💙</div>
</body>
</html>
